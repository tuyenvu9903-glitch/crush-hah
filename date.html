<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="style.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&display=swap");

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #ffffffe2;
        overflow-x: hidden;
        font-family: "Be Vietnam Pro", "Segoe UI", Tahoma, sans-serif;
      }

      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }

      .header_text {
        font-size: 50px;
        font-weight: bold;
        text-align: center;
        margin-top: 10px;
        margin-bottom: 20px;
        text-shadow: 0 0 5px rgb(255, 255, 255);
        color: #000000;
      }

      .text {
        font-size: 25px;
        font-weight: bold;
        color: rgb(181, 42, 42);
        text-align: center;
        margin-top: 20px;
        margin-bottom: 0px;
      }

      .gif_container {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 20px;
      }

      .gif_container img {
        width: 50%;
        max-height: 80%;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="gif_container">
        <img src="https://raw.githubusercontent.com/DzarelDeveloper/Img/main/hihi%20makasih.gif"
          alt="Movies Date"
        />
        <hr>
        <img src="church-date.png"
          alt="Church Date"
        />
      </div>
      <div>
        <h3 class="header_text">Thế Chúa Nhậttt anhh qua đón emmm nhé ,iuu iemm:333</h3>
      </div>
    </div>
  </body>
</html>
