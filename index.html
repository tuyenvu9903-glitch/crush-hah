<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đi lễ cùng anh nhé</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app" class="page-shell">
      <div class="love-card">
        <p class="script-accent">Dành cho em</p>
        <p class="lead-note">
          Nếu thoát ra hoặc không chọn thì… coi như em đồng ý làm người yêu
          anh nhé.
        </p>
        <h1 class="title-main">
          Em có muốn <span class="hl">đi lễ</span> với anh từ giờ tới cuối đời
          không?
        </h1>
        <img
          class="hero-img"
          src="https://raw.githubusercontent.com/DzarelDeveloper/Img/main/Let's%20go.gif"
          alt=""
        />
        <div
          v-if="currentHeaderText || noPressCount > 0"
          class="message-block"
        >
          <p class="persuade" v-show="currentHeaderText">{{ currentHeaderText }}</p>
          <p class="confirm-line" v-show="noPressCount > 0">
            {{ currentConfirmationText }}
          </p>
        </div>
        <div class="btn-row">
          <button
            type="button"
            class="btn btn-yes"
            :style="yesButtonStyle"
            :key="yesButtonSize"
            @click="yesButton"
          >
            Có
          </button>
          <button
            v-if="showNoButton"
            type="button"
            class="btn btn-no"
            @click="changeText('noButton')"
          >
            Không
          </button>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
    <script>
      new Vue({
        el: "#app",
        data: {
          headerText: [
            "",
            "Đi lễ với anh nha em :)",
            "Mình cùng đi lễ nhà thờ nhé em",
            "Anh rủ em thật lòng đó, đi cùng anh nha",
            "Chỉ lần này thôi, đi lễ cùng anh đi",
            "Chỉ có anh với em thôi, được không?",
            "Sao em chưa chịu vậy, cho anh cơ hội nha",
            "Anh sẽ qua đón em, mình đi lễ cùng nhau nha",
            "Đi với anh nha, anh hứa vui lắm",
            "Anh muốn được đi lễ cùng em",
            "Mình cùng cầu nguyện rồi đi ăn nhẹ nhé em",
            "Em đồng ý đi cùng anh nha?",
            "Mình đi lễ cùng nhau, được không em?",
          ],
          confirmationMessages: [
            "Em chắc là chưa muốn đi với anh hả?",
            "Em chắc chắn không đi lễ cùng anh chứ?",
            "Em chắc chắn tuyệt đối luôn hả?",
          ],
          currentHeaderTextIndex: 0,
          noPressCount: 0,
          yesButtonSize: 1,
        },
        methods: {
          changeText(button) {
            if (button !== "noButton") return;
            if (this.currentHeaderTextIndex >= this.headerText.length - 1) return;
            this.currentHeaderTextIndex += 1;
            this.noPressCount += 1;
            this.yesButtonSize = Math.min(this.yesButtonSize + 0.75, 5.5);
          },
          yesButton() {
            window.location.href = "date.html";
          },
        },
        computed: {
          showNoButton() {
            return this.currentHeaderTextIndex < this.headerText.length - 1;
          },
          yesButtonStyle() {
            const s = this.yesButtonSize;
            return {
              fontSize: s + "rem",
              lineHeight: 1.1,
              padding:
                0.4 + s * 0.12 + "rem " + (0.85 + s * 0.35) + "rem",
            };
          },
          currentHeaderText() {
            return this.headerText[this.currentHeaderTextIndex];
          },
          currentConfirmationText() {
            const i = Math.min(
              this.noPressCount - 1,
            );
          },
        },
      });
    </script>
  </body>
</html>
