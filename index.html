<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Em có muốn đii chơi với em hongg</title>
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&display=swap");

      body {
        font-family: "Be Vietnam Pro", "Segoe UI", Tahoma, sans-serif;
        margin: 0;
        overflow: hidden;
      }

      .center-screen {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      img {
        width: 350px;
      }
      .buttones {
        width: 100%;
        text-align: center;
      }
      .btn {
        display: inline-block;
      }
      h2 {
        color: white;
        font-size: 18px;

        padding-top: 2px;
        padding-left: 5px;
        padding-right: 5px;
      }
      .mainn a {
        text-decoration: none;
        position: absolute;
        right: 2%;
        color: red;
        bottom: 2%;
      }
      #nooo {
        background: transparent;
        color: red;
        border: none;
      }
      .nooo {
        color: red;
        font-weight: 700;
        font-size: 25px;
      }
      #nobut {
        background: red;
      }
      #yesbut {
        background: green;
        padding: 10px;
        padding-left: 18px;
        padding-right: 18px;
      }
      h1 {
        text-shadow: 0 0 10px rgba(255, 254, 255, 0.68);
        font-weight: 800;
        letter-spacing: 0.2px;
      }
    </style>
  </head>
  <body>
    <div
      id="app"
      class="center-screen"
      style="display: flex; flex-direction: column"
    >
    <p style="text-align: center; margin-top: 100px;">Nếu thoát ra hoặc không chọn thì làm người yêu anh nhé</p>
     <h1 style="text-align: center; margin-bottom: 20px;">Em có muốn đi lễ với anh từ giờ tới cuối đời không?</h1>
      <img
        src="https://raw.githubusercontent.com/DzarelDeveloper/Img/main/Let's%20go.gif"
        alt=""
      />
      <button
        type="button"
        class="btn btn-danger"
        @click="changeText('noButton')"
        id="nooo"
      >
        <h2 class="nooo" @click="changeText('heading') ">
          {{ currentHeaderText }}
        </h2>
      </button>
      <div class="buttones">
        <button
          type="button"
          class="btn btn-success mr-2"
          :style="{ fontSize: yesButtonSize + 'rem' }"
          :key="yesButtonSize"
          @click="yesButton"
          id="yesbut"
        >
          Yes
        </button>

        <button
          type="button"
          class="btn btn-danger"
          @click="changeText('noButton')"
          id="nobut"
        >
          <h2>No</h2>
        </button>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
    <script>
      new Vue({
        el: "#app",
        data: {
          headerText: [
            "",
            "Đi lễ với anh nha em :)",
            "Mình cùng đi lễ nhà thờ nhé em",
            "Anh rủ em thật lòng đó, đi cùng anh nha",
            "Chỉ lần này thôi, đi lễ cùng anh đi",
            "Chỉ có anh với em thôi, được không?",
            "Sao em chưa chịu vậy, cho anh cơ hội nha",
            "Anh sẽ qua đón em, mình đi lễ cùng nhau nha",
            "Đi với anh nha, anh hứa vui lắm",
            "Anh muốn được đi lễ cùng em",
            "Mình cùng cầu nguyện rồi đi ăn nhẹ nhé em",
            "Em đồng ý đi cùng anh nha?",
            "Mình đi lễ cùng nhau, được không em?",
          ],
          confirmationMessages: [
            "Em chắc là chưa muốn đi với anh hả?",
            "Em chắc chắn không đi lễ cùng anh chứ?",
            "Em chắc chắn tuyệt đối luôn hả?",
          ],
          currentHeaderTextIndex: 0,
          currentConfirmationIndex: 0,
          yesButtonSize: 1,
        },
        methods: {
          changeText(button) {
            if (button === "noButton") {
              this.currentHeaderTextIndex =
                (this.currentHeaderTextIndex + 1) % this.headerText.length;
              this.currentConfirmationIndex =
                (this.currentConfirmationIndex + 1) %
                this.confirmationMessages.length;
              this.yesButtonSize += 5;
            }
          },
          yesButton() {
            window.location.href = "date.html";
          },
        },
        computed: {
          currentHeaderText() {
            return this.headerText[this.currentHeaderTextIndex];
          },
          currentConfirmationText() {
            return this.confirmationMessages[this.currentConfirmationIndex];
          },
        },
      });
    </script>
  </body>
</html>
